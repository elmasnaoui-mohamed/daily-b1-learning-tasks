<script>
// Local-only launcher cleanup: keep the exam selector minimal without touching exam actions.
(function () {
  function normalize(text) {
    return (text || "").replace(/\s+/g, " ").trim().toLowerCase();
  }

  function findExact(expected) {
    var target = normalize(expected);
    var nodes = document.querySelectorAll("h1, h2, h3, p, div, span, section, article");
    var match = null;
    for (var i = 0; i < nodes.length; i += 1) {
      var node = nodes[i];
      if (normalize(node.textContent) === target) {
        if (!match || node.textContent.length < match.textContent.length) {
          match = node;
        }
      }
    }
    return match;
  }

  function findSmallestContaining(parts) {
    var nodes = document.querySelectorAll("div, section, article");
    var match = null;
    for (var i = 0; i < nodes.length; i += 1) {
      var node = nodes[i];
      var text = normalize(node.textContent);
      var ok = true;
      for (var j = 0; j < parts.length; j += 1) {
        if (text.indexOf(parts[j]) === -1) {
          ok = false;
          break;
        }
      }
      if (ok && (!match || text.length < normalize(match.textContent).length)) {
        match = node;
      }
    }
    return match;
  }

  function hideNode(node) {
    if (!node) return;
    node.classList.add("tp-launcher-hidden");
    node.style.setProperty("display", "none", "important");
    node.style.setProperty("margin", "0", "important");
    node.style.setProperty("padding", "0", "important");
    node.style.setProperty("min-height", "0", "important");
  }

  function patchBackToExamsButton() {
    var buttons = document.querySelectorAll(".navbar-btn-back");
    for (var i = 0; i < buttons.length; i += 1) {
      var button = buttons[i];
      if (button.dataset.tpLabelPatched === "true") continue;
      button.dataset.tpLabelPatched = "true";
      button.classList.add("tp-back-nav-pill");
      button.setAttribute("title", "Zur Exam-Auswahl");
      button.setAttribute("aria-label", "Zur Exam-Auswahl");
      button.innerHTML = '<span class="tp-back-nav-pill__icon" aria-hidden="true">←</span><span class="tp-back-nav-pill__label">Zur Exam-Auswahl</span>';
    }
  }

  function ensureLauncherFooter(cardsBlock) {
    if (!cardsBlock || !cardsBlock.parentElement) return;
    var existing = document.getElementById("tpLauncherFooter");
    if (existing) {
      if (existing.previousElementSibling !== cardsBlock) {
        cardsBlock.insertAdjacentElement("afterend", existing);
      }
      existing.style.setProperty("display", "grid", "important");
      return;
    }

    var footer = document.createElement("div");
    footer.id = "tpLauncherFooter";
    footer.className = "tp-launcher-footer";

    var link = document.createElement("a");
    link.className = "tp-launcher-footer__button";
    link.href = "../../index.html";
    link.innerHTML = '<span class="tp-launcher-footer__icon" aria-hidden="true">←</span><span>العودة إلى منصة التعلّم</span>';

    var subtitle = document.createElement("p");
    subtitle.className = "tp-launcher-footer__subtitle";
    subtitle.textContent = "Mit ❤️ von Rinkute";

    footer.appendChild(link);
    footer.appendChild(subtitle);
    cardsBlock.insertAdjacentElement("afterend", footer);
  }

  function cleanLauncher() {
    var title = findExact("Choose your exam");
    var subtitle = findExact("Each exam includes its own authentic practice set. Choose one and start preparing now!");
    var cardsBlock = findSmallestContaining(["telc b1", "telc b2", "start b1", "start b2"]);
    if (!title || !subtitle || !cardsBlock) return false;

    var wrapper = cardsBlock.parentElement;
    if (!wrapper || wrapper !== title.parentElement || wrapper !== subtitle.parentElement) {
      wrapper = title.parentElement;
    }
    if (!wrapper) return false;

    for (var prev = title.previousElementSibling; prev; prev = prev.previousElementSibling) {
      hideNode(prev);
    }

    for (var next = cardsBlock.nextElementSibling; next; next = next.nextElementSibling) {
      if (next.id !== "tpLauncherFooter") {
        hideNode(next);
      }
    }

    hideNode(findExact("COMING SOON"));
    hideNode(findSmallestContaining(["goethe b1", "goethe b2"]));
    hideNode(findSmallestContaining(["telc premium n'est pas affili"]));
    hideNode(findSmallestContaining(["telc", "premium"]));

    var section = wrapper.parentElement;
    if (section) {
      section.style.setProperty("padding", "32px 24px", "important");
      section.style.setProperty("min-height", "100vh", "important");
      section.style.setProperty("display", "flex", "important");
      section.style.setProperty("align-items", "center", "important");
      section.style.setProperty("justify-content", "center", "important");
    }

    wrapper.style.setProperty("width", "100%", "important");
    wrapper.style.setProperty("max-width", "860px", "important");
    wrapper.style.setProperty("margin", "0 auto", "important");
    wrapper.style.setProperty("display", "grid", "important");
    wrapper.style.setProperty("justify-items", "center", "important");
    wrapper.style.setProperty("gap", "0", "important");

    title.style.setProperty("margin", "0 0 12px", "important");
    subtitle.style.setProperty("margin", "0 auto 28px", "important");
    subtitle.style.setProperty("max-width", "620px", "important");
    cardsBlock.style.setProperty("margin", "0", "important");
    ensureLauncherFooter(cardsBlock);

    return true;
  }

  function init() {
    cleanLauncher();
    patchBackToExamsButton();
    setInterval(cleanLauncher, 500);
    setInterval(patchBackToExamsButton, 500);

    var root = document.getElementById("root");
    if (root && "MutationObserver" in window) {
      new MutationObserver(function () {
        cleanLauncher();
        patchBackToExamsButton();
      }).observe(root, { childList: true, subtree: true });
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
